# Intentionally left as a non-runnable placeholder.
#
# Use an explicit compose file instead of relying on docker-compose.yaml by default:
#
# Production panel:
#   docker compose -f docker-compose.panel.yml up -d --build
#
# Staging/dev:
#   docker compose -f docker-compose.staging.yml up -d --build
#
# This avoids mixing production and staging behavior by accident.
services: {}
